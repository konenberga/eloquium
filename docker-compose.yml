services:
  tts:
    build: .
    container_name: eloquium-tts
    restart: unless-stopped

    ports:
      # Bind to localhost only for security (personal-use phase)
      - "127.0.0.1:8000:8000"

    environment:
      HF_HOME: /cache
      NUMBA_CACHE_DIR: /tmp/numba_cache
      # Pre-trained Russian+English F5-TTS (hotstone228/F5-TTS-Russian).
      # Files are downloaded into the model-cache volume at /cache/ru/.
      # NOTE: this checkpoint is the v0 "F5TTS_Base" architecture, so F5_MODEL
      # must override the v1 default, and it ships its own extended vocab.
      F5_CHECKPOINT: /cache/ru/model_last.safetensors
      F5_VOCAB: /cache/ru/vocab.txt
      F5_MODEL: F5TTS_Base
      # This checkpoint was trained on PLAIN Russian text — RUAccent '+' stress
      # marks corrupt it (verified via ASR round-trip), so stress is OFF. Set
      # F5_RU_STRESS=1 only for a checkpoint trained on stress-marked data.
      # F5_RU_STRESS: "1"
      # Russian reference voice (defines the voice F5-TTS imitates). A native RU
      # reference is essential for natural Russian — the bundled English default
      # injects a foreign accent. Clip from google/fleurs ru_ru (CC BY 4.0).
      F5_REF_AUDIO: /app/assets/ref_ru.wav
      F5_REF_TEXT: "как только вы выйдете из течения плыть обратно будет не труднее чем обычно"

    volumes:
      # Model weights persist here across restarts — first run downloads them.
      - model-cache:/cache

    networks:
      - eloquium-net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    # GPU is opt-in via the docker-compose.gpu.yml override (the Makefile adds it
    # automatically when an NVIDIA GPU is present). Kept out of the base file so
    # `docker compose up` still works on CPU-only machines.

networks:
  eloquium-net:
    driver: bridge

volumes:
  model-cache:
