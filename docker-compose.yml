services:
  tts:
    build: .
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /cache
      # Swap in the cloud-trained model by uncommenting and pointing at the file:
      # F5_CHECKPOINT: /cache/your_model.pt
      # Override the default voice:
      # F5_REF_AUDIO: /cache/my_voice.wav
      # F5_REF_TEXT: "transcript of the reference audio"
    volumes:
      # Model weights persist here across restarts — first run downloads them.
      - model-cache:/cache
    restart: unless-stopped

    # --- Enable GPU (requires nvidia-container-toolkit on the host) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  model-cache:
