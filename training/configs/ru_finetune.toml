# Russian fine-tune configuration for F5-TTS.
# Consumed by training/finetune.py. Values are conservative starting points —
# tune on the GPU box against your dataset size and VRAM.

[dataset]
name        = "eloquium_ru"        # matches data/<name>_char/ from prepare step
language    = "ru"
# Built by: f5-tts_prepare_csv_wavs <out-dir> data/eloquium_ru_char
tokenizer   = "char"               # F5-TTS char tokenizer; vocab.txt carries Cyrillic

[base]
# Fine-tune FROM the base checkpoint rather than training from scratch.
model       = "F5TTS_v1_Base"
# Leave empty to let F5-TTS pull the base weights; or point at a local .pt.
pretrain_ckpt = ""

[train]
epochs              = 50
batch_size_per_gpu  = 3200         # F5-TTS batches by frames when batch_size_type="frame"
batch_size_type     = "frame"
max_samples         = 64
learning_rate       = 1e-5         # low LR for fine-tuning, avoid wrecking base
warmup_updates      = 2000
grad_accumulation   = 1
max_grad_norm       = 1.0
save_per_updates    = 5000
last_per_updates    = 1000
num_workers         = 8

[output]
ckpt_dir   = "checkpoints"
export_name = "model_eloquium_ru.pt"
